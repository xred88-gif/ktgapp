<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Amazon Placement Report Creation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b1220;--panel:#121a2b;--ink:#e7ecf8;--muted:#9fb0d3;--accent:#7aa2ff;--ok:#2ecc71;--warn:#ffb020;--err:#e74c3c}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--ink)}
.wrap{max-width:980px;margin:40px auto;padding:24px}
.card{background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
h1{font-size:28px;margin:0 0 12px}
h3{margin:22px 0 10px}
.help{color:var(--muted);margin:6px 0 16px}
.small{font-size:12px;color:var(--muted)}
label{display:block;font-weight:600;margin:12px 0 6px}
input[type="file"],select,button,textarea{width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:#0f1626;color:var(--ink);outline:none;font-family:inherit;font-size:14px}
textarea{resize:vertical;min-height:180px}
input[type="file"]:focus,select:focus,button:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(122,162,255,.25)}
.btn{cursor:pointer;font-weight:700;letter-spacing:.2px;border:none}
.btn.primary{background:linear-gradient(90deg,#5a82ff,#7aa2ff)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.mt{margin-top:14px}
.status{display:flex;gap:10px;align-items:center;color:var(--muted)}
.dot{width:10px;height:10px;border-radius:50%;background:var(--warn)}
.dot.ok{background:var(--ok)}
.dot.err{background:var(--err)}
footer{margin-top:24px;color:var(--muted);font-size:12px;text-align:center}
code{background:#0f1626;padding:2px 6px;border-radius:6px;border:1px solid rgba(255,255,255,.08)}
.warning-banner{background:rgba(255,176,32,.1);border:1px solid rgba(255,176,32,.3);border-radius:10px;padding:10px 14px;margin-top:10px;color:#ffb020;font-size:13px;display:none}
.prog{height:4px;background:#1a2540;border-radius:4px;margin-top:10px;overflow:hidden}
.prog-bar{height:100%;width:0;background:linear-gradient(90deg,#5a82ff,#7aa2ff);transition:width .2s}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>📊 Amazon Placement Report Creator</h1>
    <p class="help">Upload all Excel files at once. Assign each file to its role. Click <strong>Proceed</strong> to export <code>placement.xlsx</code>.</p>
    <div>
      <label>Upload all Excel files</label>
      <input id="allFiles" type="file" accept=".xlsx,.xls" multiple />
    </div>
    <div id="fileAssignments" class="row mt"></div>
    <div id="warningBanner" class="warning-banner"></div>
    <div class="prog" id="progWrap" style="display:none"><div class="prog-bar" id="progBar"></div></div>
    <div class="row mt">
      <div><button id="proceed" class="btn primary">Proceed</button></div>
      <div class="status"><span class="dot" id="statusDot"></span><span id="status"></span></div>
    </div>
    <h3 class="mt">Log data</h3>
    <textarea id="log" readonly></textarea>
  </div>
  <footer class="small"></footer>
</div>
<script>
/* ---- Helpers ---- */
const L=[];
function log(s){L.push(s);if(L.length>300)L.shift()}
function flushLog(){document.getElementById('log').value=L.join('\n')}
function setStatus(t,state){const s=document.getElementById('status'),d=document.getElementById('statusDot');s.textContent=t||'';d.classList.remove('ok','err');if(state==='ok')d.classList.add('ok');else if(state==='err')d.classList.add('err')}
function showWarning(m){const b=document.getElementById('warningBanner');b.style.display=m?'block':'none';b.textContent=m||''}
function prog(p){const w=document.getElementById('progWrap'),b=document.getElementById('progBar');w.style.display=p>=0?'block':'none';b.style.width=Math.min(100,Math.max(0,p))+'%'}
function readFile(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=()=>rej(new Error('Read fail: '+f.name));r.readAsArrayBuffer(f)})}

/* yield to browser so it doesn't freeze */
const tick=()=>new Promise(r=>setTimeout(r,0));

/* find column index in header array */
function fc(hdr,names){
  if(!hdr)return -1;
  for(const n of names){const ln=n.toLowerCase().trim();for(let i=0;i<hdr.length;i++){if(String(hdr[i]||'').toLowerCase().trim()===ln)return i}}
  return -1;
}
/* get value from row array by col index */
function gv(r,i){return(i>=0&&r&&i<r.length)?r[i]:''}

function num(v){if(v==null||v==='')return 0;if(typeof v==='number')return isFinite(v)?v:0;const n=parseFloat(String(v).replace(/[^0-9.\-eE]/g,''));return isNaN(n)?0:n}
function acosDec(v){if(v==null||v==='')return 0;if(typeof v==='number')return isFinite(v)?v:0;const s=String(v).trim();if(!s)return 0;if(s.includes('%')){const n=parseFloat(s.replace(/[^0-9.\-eE]/g,''));return isNaN(n)?0:n/100}const n=parseFloat(s.replace(/[^0-9.\-eE]/g,''));return isNaN(n)?0:Math.abs(n)>1?n/100:n}

/* Normalise placement name for matching against "Placement Top" variants */
function isPlacementTop(pl){
  const s=String(pl||'').toLowerCase().trim();
  return s==='placement top'||s==='top of search (on-amazon)'||s==='top'||s.includes('top of search');
}

/* Read one file → return raw AOA (arrays of arrays). Frees workbook immediately. */
async function loadSheet(file,sheetCands,label){
  const buf=await readFile(file);
  await tick();
  const wb=XLSX.read(buf,{type:'array',cellStyles:false,cellFormula:false,cellHTML:false,cellDates:false});
  await tick();
  /* pick best sheet name */
  let sn=wb.SheetNames[0];
  outer:for(const n of wb.SheetNames)for(const c of sheetCands)if(n.toLowerCase()===c.toLowerCase()){sn=n;break outer}
  const ws=wb.Sheets[sn];
  /* free everything except the one sheet we need */
  for(const k of wb.SheetNames)if(k!==sn)wb.Sheets[k]=null;
  if(!ws){log(label+': empty sheet');return null}
  const aoa=XLSX.utils.sheet_to_json(ws,{header:1,raw:true});
  /* free workbook */
  wb.Sheets[sn]=null;wb.SheetNames=null;
  const rows=aoa.length>1?aoa.length-1:0;
  log(label+': "'+sn+'" → '+rows+' rows');
  await tick();
  return aoa;/* aoa[0]=headers, aoa[1..n]=data */
}

/* ---- File assignment UI ---- */
document.getElementById('allFiles').addEventListener('change',e=>{
  const files=Array.from(e.target.files);if(!files.length)return;
  const roles=['Bulk 30d','Bulk 7d','30d campaigns','7d campaigns','Day Before Yesterday','Yesterday'];
  const c=document.getElementById('fileAssignments');c.innerHTML='';showWarning('');

  function getUsed(){
    const u=new Set();
    c.querySelectorAll('select').forEach(s=>{
      if(s.multiple)Array.from(s.selectedOptions).forEach(o=>{if(o.value!=='')u.add(o.value)});
      else if(s.value!=='')u.add(s.value);
    });return u;
  }
  function refresh(){
    const u=getUsed();
    c.querySelectorAll('select').forEach(s=>{
      const my=new Set();
      if(s.multiple)Array.from(s.selectedOptions).forEach(o=>{if(o.value!=='')my.add(o.value)});
      else if(s.value!=='')my.add(s.value);
      Array.from(s.options).forEach(o=>{if(o.value!=='')o.disabled=u.has(o.value)&&!my.has(o.value)});
    });
  }

  roles.forEach(role=>{
    const sel=document.createElement('select');sel.dataset.role=role;
    const multi=['30d campaigns','7d campaigns','Day Before Yesterday','Yesterday'].includes(role);
    if(multi)sel.multiple=true;
    let h=multi?'':'<option value="">-- Select --</option>';
    files.forEach((f,i)=>{h+='<option value="'+i+'">'+f.name+'</option>'});
    sel.innerHTML=h;
    const lbl=document.createElement('label');lbl.textContent=role;lbl.appendChild(sel);
    if(multi){
      const sp=document.createElement('span');sp.className='small';sp.style.marginLeft='6px';sp.textContent='(0)';
      lbl.appendChild(sp);
      sel.addEventListener('change',()=>{sp.textContent='('+sel.selectedOptions.length+')';refresh()});
    }else{sel.addEventListener('change',refresh)}
    c.appendChild(lbl);
  });
});

/* ---- Main processing ---- */
document.getElementById('proceed').addEventListener('click',async function(){
  this.disabled=true;setStatus('Working...');showWarning('');prog(0);L.length=0;log('Start');flushLog();
  try{
    const allFiles=document.getElementById('allFiles').files;
    const selects=document.querySelectorAll('#fileAssignments select');
    if(!allFiles||!allFiles.length)throw new Error('Upload files first');
    if(!selects.length)throw new Error('Upload files first');

    /* collect role→files */
    const rf={};
    selects.forEach(sel=>{
      const idxs=sel.multiple?Array.from(sel.selectedOptions).map(o=>o.value).filter(v=>v!==''):(sel.value!==''?[sel.value]:[]);
      if(idxs.length)rf[sel.dataset.role.replace(/\s+/g,'')]=idxs.map(i=>allFiles[parseInt(i)]);
    });
    if(!Object.keys(rf).length)throw new Error('Assign at least one file');

    const bulkS=['Sponsored Products Campaigns','Sponsored Products - Campaigns','Sponsored Products'];
    const campS=['Campaigns','Sponsored Products Campaigns','Sheet1'];
    let step=0,totalSteps=Object.values(rf).reduce((a,b)=>a+b.length,0)+3;
    function sp(){step++;prog(step/totalSteps*100);flushLog()}

    /* ===== 1. Bulk30d → USA entries ===== */
    /* each entry: [cn,clicks,spend,orders,acos,placement,pct,change] */
    let usa=[];
    if(rf.Bulk30d){
      log('--- Bulk 30d ---');
      const aoa=await loadSheet(rf.Bulk30d[0],bulkS,'Bulk30d');sp();
      if(aoa&&aoa.length>1){
        const h=aoa[0];
        const C={cn:fc(h,['Campaign Name (Informational only)','Campaign Name','Campaigns']),
                 st:fc(h,['Campaign State (Informational only)','Campaign State']),
                 cl:fc(h,['Clicks']),sp:fc(h,['Spend','Spend (USD)','Total Spend']),
                 or:fc(h,['Orders','Total Orders']),ac:fc(h,['ACOS','ACoS']),
                 pl:fc(h,['Placement']),pc:fc(h,['Percentage','%'])};
        for(let i=1;i<aoa.length;i++){
          const r=aoa[i];if(!r)continue;
          const pl=gv(r,C.pl);if(!pl||String(pl).trim()==='')continue;
          const st=gv(r,C.st);if(st&&String(st).toLowerCase().includes('paused'))continue;
          usa.push([String(gv(r,C.cn)||''),num(gv(r,C.cl)),num(gv(r,C.sp)),
                    num(gv(r,C.or)),acosDec(gv(r,C.ac)),String(pl).trim(),
                    num(gv(r,C.pc)),'']);
          aoa[i]=null;/* free row */
        }
        aoa.length=0;
      }
      log('USA entries: '+usa.length);
    }
    await tick();

    /* ===== 2. Bulk7d → b7 entries + placement lookup map ===== */
    /* each: [cn,pl,clicks,spend,orders,acos] */
    let b7=[];
    let b7Map=new Map();
    if(rf.Bulk7d){
      log('--- Bulk 7d ---');
      for(const file of rf.Bulk7d){
        const aoa=await loadSheet(file,bulkS,'Bulk7d');sp();
        if(!aoa||aoa.length<2)continue;
        const h=aoa[0];
        const C={cn:fc(h,['Campaign Name (Informational only)','Campaign Name','Campaigns']),
                 st:fc(h,['Campaign State (Informational only)','Campaign State']),
                 cl:fc(h,['Clicks']),sp:fc(h,['Spend','Spend (USD)','Total Spend']),
                 or:fc(h,['Orders']),ac:fc(h,['ACOS','ACoS']),pl:fc(h,['Placement'])};
        for(let i=1;i<aoa.length;i++){
          const r=aoa[i];if(!r)continue;
          const pl=gv(r,C.pl);if(!pl||String(pl).trim()==='')continue;
          const st=gv(r,C.st);if(st&&String(st).toLowerCase().includes('paused'))continue;
          const cn=String(gv(r,C.cn)||''),pls=String(pl).trim();
          const clicks=num(gv(r,C.cl)),spend=num(gv(r,C.sp)),orders=num(gv(r,C.or)),acos=acosDec(gv(r,C.ac));
          b7.push([cn,pls,clicks,spend,orders,acos]);
          b7Map.set(cn.toLowerCase()+'|'+pls.toLowerCase(),{acos,spend,orders});
          aoa[i]=null;
        }
        aoa.length=0;
      }
      log('Bulk7d entries: '+b7.length);
    }
    await tick();

    /* ===== 3. DayBefore → db entries [cn,portfolio,budget,spend] ===== */
    let db=[];
    if(rf.DayBeforeYesterday){
      log('--- Day Before Yesterday ---');
      for(const file of rf.DayBeforeYesterday){
        const aoa=await loadSheet(file,campS,'DayBefore');sp();
        if(!aoa||aoa.length<2)continue;
        const h=aoa[0];
        const C={cn:fc(h,['Campaigns','Campaign Name','Campaign']),
                 po:fc(h,['Portfolio','Portfolio name','Portfolio Name']),
                 bu:fc(h,['Budget','Daily Budget','Budget (USD)','Campaign budget amount']),
                 sp:fc(h,['Spend','Spend (USD)','Total Spend','Total Cost'])};
        for(let i=1;i<aoa.length;i++){
          const r=aoa[i];if(!r)continue;
          db.push([String(gv(r,C.cn)||''),String(gv(r,C.po)||''),gv(r,C.bu)||'',num(gv(r,C.sp))]);
          aoa[i]=null;
        }
        aoa.length=0;
      }
      log('DayBefore entries: '+db.length);
    }
    await tick();

    /* ===== 4. Yesterday → yd entries [cn,spend] + TOS ===== */
    let yd=[];
    let tosYd=[];
    if(rf.Yesterday){
      log('--- Yesterday ---');
      for(const file of rf.Yesterday){
        const aoa=await loadSheet(file,campS,'Yesterday');sp();
        if(!aoa||aoa.length<2)continue;
        const h=aoa[0];
        const C={cn:fc(h,['Campaigns','Campaign Name','Campaign']),
                 sp:fc(h,['Spend','Spend (USD)','Total Spend','Total Cost']),
                 tos:fc(h,['Top-of-search impression share','Top of search impression share'])};
        for(let i=1;i<aoa.length;i++){
          const r=aoa[i];if(!r)continue;
          yd.push([String(gv(r,C.cn)||''),num(gv(r,C.sp))]);
          if(C.tos>=0)tosYd.push([String(gv(r,C.cn)||''),gv(r,C.tos)||0]);
          aoa[i]=null;
        }
        aoa.length=0;
      }
      log('Yesterday entries: '+yd.length);
    }
    await tick();

    /* ===== 5. 30d campaigns → TOS ===== */
    let tos30=[];
    if(rf['30dcampaigns']){
      log('--- 30d campaigns ---');
      for(const file of rf['30dcampaigns']){
        const aoa=await loadSheet(file,campS,'30d camps');sp();
        if(!aoa||aoa.length<2)continue;
        const h=aoa[0];
        const C={cn:fc(h,['Campaigns','Campaign Name','Campaign']),
                 tos:fc(h,['Top-of-search impression share','Top of search impression share'])};
        for(let i=1;i<aoa.length;i++){
          const r=aoa[i];if(!r)continue;
          tos30.push([String(gv(r,C.cn)||''),gv(r,C.tos)||0]);
          aoa[i]=null;
        }
        aoa.length=0;
      }
      log('TOS 30d: '+tos30.length);
    }
    await tick();

    /* ===== 6. 7d campaigns → TOS ===== */
    let tos7=[];
    if(rf['7dcampaigns']){
      log('--- 7d campaigns ---');
      for(const file of rf['7dcampaigns']){
        const aoa=await loadSheet(file,campS,'7d camps');sp();
        if(!aoa||aoa.length<2)continue;
        const h=aoa[0];
        const C={cn:fc(h,['Campaigns','Campaign Name','Campaign']),
                 tos:fc(h,['Top-of-search impression share','Top of search impression share'])};
        for(let i=1;i<aoa.length;i++){
          const r=aoa[i];if(!r)continue;
          tos7.push([String(gv(r,C.cn)||''),gv(r,C.tos)||0]);
          aoa[i]=null;
        }
        aoa.length=0;
      }
      log('TOS 7d: '+tos7.length);
    }
    await tick();

    /* ===== 7. Apply placement changes ===== */
    log('--- Placement changes ---');
    if(usa.length&&b7Map.size){
      let m=0;
      for(const e of usa){
        const k=e[0].toLowerCase()+'|'+e[5].toLowerCase();
        const u=b7Map.get(k);
        if(!u)continue;
        m++;

        const base=e[6];      // current percentage from Bulk 30d
        const placement=e[5]; // placement name string
        let nv=base;          // new value starts equal to base

        /*
          Special rule: if ACOS is 0% AND the placement is NOT "Placement Top",
          do NOT add anything to the Changes in placement column — leave it blank.
          For Placement Top, normal logic applies even when ACOS is 0%.
        */
        if(u.acos===0 && !isPlacementTop(placement)){
          e[7]='';
          continue;
        }

        if(u.spend>10&&u.orders===0){nv=base-5;}
        else if(u.spend>0&&u.orders===0){nv=base+5;}
        else if(u.spend===0&&u.orders===0){nv=base+5;}
        else{
          if(u.acos>=0.7){nv=base-5;}
          else if(u.acos>=0.5){nv=base-5;}
          else if(u.acos>=0.2&&u.acos<0.3){nv=base+5;}
          else if(u.acos>=0.1&&u.acos<0.2){nv=base+10;}
          else if(u.acos>0&&u.acos<0.1){nv=base+15;}
          // acos between 0.3 and 0.5 → no change, nv stays equal to base
        }

        if(nv<0)nv=0;
        if(nv>900)nv=900;

        const rounded=Math.round(nv*100)/100;

        // Only write the new value if it actually differs from the current percentage
        e[7]=(rounded!==base)?rounded:'';
      }
      log('Placement matches: '+m+'/'+usa.length);
    }
    b7Map.clear();b7Map=null;
    await tick();sp();

    /* ===== 8. Build output workbook using AOA (fastest) ===== */
    log('--- Building output ---');
    const out=XLSX.utils.book_new();
    let added=0;

    /* USA sheet */
    if(usa.length){
      const hdr=['Campaign Name (Informational only)','Portfolio','Budget','Clicks','Spend','Orders','CVR','ACOS',
        'total Clicks','total Spend','total Orders','total CVR','total ACoS',
        'Spent DB Yesterday','Spent Yesterday','Budget Check',
        'Last 30 days','Last 7 days','Yesterday','Placement','Percentage','Changes in placement'];
      const aoa=[hdr];
      for(let i=0;i<usa.length;i++){
        const e=usa[i];
        aoa.push([e[0],'','',e[1],e[2],e[3],'',(e[4]!==''&&e[4]!=null)?+(e[4]*100).toFixed(2)+'%':'','','','','','','','','','','','',e[5],e[6],e[7]]);
        usa[i]=null;
      }
      usa.length=0;
      XLSX.utils.book_append_sheet(out,XLSX.utils.aoa_to_sheet(aoa),'USA');added++;
      log('USA sheet: '+(aoa.length-1)+' rows');
      aoa.length=0;
      await tick();
    }

    /* Data update sheet */
    const duLen=Math.max(b7.length,db.length,yd.length);
    if(duLen){
      const hdr=['Campaign Name_bulk7','Placement','Clicks','Spend_bulk7','Orders','ACOS',
        'Campaign Name_dayBefore','Portfolio_dayBefore','Budget_dayBefore','Spend_dayBefore',
        'Campaign Name_yesterday','Spend_yesterday'];
      const aoa=[hdr];
      for(let i=0;i<duLen;i++){
        const a=b7[i],d=db[i],y=yd[i];
        aoa.push([
          a?a[0]:'',a?a[1]:'',a?a[2]:'',a?a[3]:'',a?a[4]:'',a?a[5]:'',
          d?d[0]:'',d?d[1]:'',d?d[2]:'',d?d[3]:'',
          y?y[0]:'',y?y[1]:''
        ]);
      }
      b7.length=0;db.length=0;yd.length=0;
      XLSX.utils.book_append_sheet(out,XLSX.utils.aoa_to_sheet(aoa),'data update');added++;
      log('Data update: '+(aoa.length-1)+' rows');
      aoa.length=0;
      await tick();
    }

    /* TOS sheet */
    const tosLen=Math.max(tos30.length,tos7.length,tosYd.length);
    if(tosLen){
      const hdr=['Campaigns_30d','30d TOS','','Campaigns_7d','7d TOS','','Campaigns_yesterday','yesterday TOS'];
      const aoa=[hdr];
      for(let i=0;i<tosLen;i++){
        const a=tos30[i],b=tos7[i],c=tosYd[i];
        aoa.push([a?a[0]:'',a?a[1]:0,'',b?b[0]:'',b?b[1]:0,'',c?c[0]:'',c?c[1]:0]);
      }
      tos30.length=0;tos7.length=0;tosYd.length=0;
      XLSX.utils.book_append_sheet(out,XLSX.utils.aoa_to_sheet(aoa),'TOS');added++;
      log('TOS: '+(aoa.length-1)+' rows');
      aoa.length=0;
      await tick();
    }

    if(!added){
      XLSX.utils.book_append_sheet(out,XLSX.utils.aoa_to_sheet([['No data generated']]),'Info');
      showWarning('No data — check file assignments');
    }
    sp();

    log('Writing file...');flushLog();
    await tick();
    XLSX.writeFile(out,'placement.xlsx');
    log('✅ Exported placement.xlsx');
    setStatus('Done — downloaded','ok');prog(100);

  }catch(err){
    console.error(err);log('❌ '+err.message);setStatus('Error: '+err.message,'err');showWarning(err.message);
  }finally{
    flushLog();prog(-1);this.disabled=false;
  }
});
</script>
</body>
</html>
