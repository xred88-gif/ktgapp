<!-- Worker source — runs in its own memory heap -->
<script>
/* ─────────────────────────────────────────────────────────────────────
   ZIP / XLSX utility functions — run on the main thread.
   ───────────────────────────────────────────────────────────────────── */

/* col letters → 0-based index */
function colIdx(col) {
  let n = 0;
  for (let i = 0; i < col.length; i++) n = n * 26 + col.charCodeAt(i) - 64;
  return n - 1;
}

/* decode "AZ123" → {r:122, c:51} (0-based) */
function decodeAddr(addr) {
  const m = /^([A-Z]+)(\d+)$/.exec(addr);
  if (!m) return null;
  return { r: parseInt(m[2], 10) - 1, c: colIdx(m[1]) };
}

/* little-endian reads */
function u16(dv, o) { return dv.getUint16(o, true); }
function u32(dv, o) { return dv.getUint32(o, true); }

/* XML entity decode */
function ent(s) {
  return s.replace(/&amp;/g,'&').replace(/&lt;/g,'<')
          .replace(/&gt;/g,'>').replace(/&quot;/g,'"')
          .replace(/&apos;/g,"'").replace(/&#(\d+);/g,(_,n)=>String.fromCharCode(+n));
}

/* ── Parse ZIP Central Directory → map of filename → {compression, compSize, lhdrOff} ── */
function parseCentralDir(u8) {
  const dv = new DataView(u8.buffer, u8.byteOffset, u8.byteLength);
  const len = u8.length;
  let eocdOff = -1;
  for (let i = len - 22; i >= Math.max(0, len - 65558); i--) {
    if (u8[i]===0x50&&u8[i+1]===0x4B&&u8[i+2]===0x05&&u8[i+3]===0x06) { eocdOff = i; break; }
  }
  if (eocdOff < 0) throw new Error('Not a valid ZIP file');
  const cdOffset = u32(dv, eocdOff + 16);
  const cdSize   = u32(dv, eocdOff + 12);
  const dec = new TextDecoder('utf-8');
  const entries = {};
  let i = cdOffset;
  while (i < cdOffset + cdSize) {
    if (u32(dv, i) !== 0x02014B50) break;
    const compression = u16(dv, i + 10);
    const compSize    = u32(dv, i + 20);
    const fnLen       = u16(dv, i + 28);
    const extraLen    = u16(dv, i + 30);
    const commLen     = u16(dv, i + 32);
    const lhdrOff     = u32(dv, i + 42);
    const fname       = dec.decode(u8.slice(i + 46, i + 46 + fnLen));
    entries[fname]    = { compression, compSize, lhdrOff };
    i += 46 + fnLen + extraLen + commLen;
  }
  return entries;
}

/* ── Get compressed bytes for a zip entry via its local file header ── */
function getEntryData(u8, entry) {
  const dv = new DataView(u8.buffer, u8.byteOffset, u8.byteLength);
  const off = entry.lhdrOff;
  if (u32(dv, off) !== 0x04034B50) throw new Error('Bad local file header');
  const fnLen    = u16(dv, off + 26);
  const extraLen = u16(dv, off + 28);
  const dataStart = off + 30 + fnLen + extraLen;
  return u8.slice(dataStart, dataStart + entry.compSize);
}

/* ── Decompress a stored or deflated entry to a UTF-8 string (for small files) ── */
async function decompressToString(entry, u8) {
  const compData = getEntryData(u8, entry);
  if (entry.compression === 0) return new TextDecoder('utf-8').decode(compData);
  const ds = new DecompressionStream('deflate-raw');
  const writer = ds.writable.getWriter();
  writer.write(compData);
  writer.close();
  const reader = ds.readable.getReader();
  const chunks = [];
  while (true) {
    const {done, value} = await reader.read();
    if (done) break;
    chunks.push(value);
  }
  let total = 0; for (const c of chunks) total += c.length;
  const merged = new Uint8Array(total);
  let off = 0; for (const c of chunks) { merged.set(c, off); off += c.length; }
  return new TextDecoder('utf-8').decode(merged);
}

/* ── Parse sharedStrings XML → string array ── */
function parseSharedStrings(xml) {
  const result = [];
  const re = /<si>([\s\S]*?)<\/si>/g;
  let m;
  while ((m = re.exec(xml)) !== null) {
    const texts = [];
    const tr = /<t[^>]*>([\s\S]*?)<\/t>/g;
    let tm;
    while ((tm = tr.exec(m[1])) !== null) texts.push(ent(tm[1]));
    result.push(texts.join(''));
  }
  return result;
}

<script>
/* ================================================================
   Main-thread parser — replaces the Web Worker approach.
   Blob-URL workers are blocked in sandboxed iframes, so we run
   the same ZIP/XML streaming logic directly on the main thread.
   ================================================================ */

/* parseInWorker — same signature as before, now runs inline */
async function parseInWorker(file, sheetCands, onChunk) {
  const buf = await new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Cannot read file: ' + file.name));
    reader.onload = (ev) => { resolve(ev.target.result); };
    reader.readAsArrayBuffer(file);
  });

  const u8 = new Uint8Array(buf);
  const CHUNK_SIZE = 1000;

  /* Detect CSV */
  const isZip = u8[0]===0x50 && u8[1]===0x4B && u8[2]===0x03 && u8[3]===0x04;
  if (!isZip) {
    const text = new TextDecoder('utf-8').decode(u8);
    let first = true;
    let chunk = [];
    let pos = 0;
    const len = text.length;
    function parseLine() {
      const row = []; let cur = ''; let inQ = false;
      while (pos < len) {
        const ch = text[pos++];
        if (ch==='"') { if (inQ&&text[pos]==='"'){cur+='"';pos++;}else inQ=!inQ; }
        else if (ch===','&&!inQ){row.push(cur===''?null:cur);cur='';}
        else if ((ch==='\n'||ch==='\r')&&!inQ){if(ch==='\r'&&text[pos]==='\n')pos++;row.push(cur===''?null:cur);return row;}
        else cur+=ch;
      }
      if(cur!==''||row.length)row.push(cur===''?null:cur);
      return row.length?row:null;
    }
    while (pos < len) {
      const row = parseLine(); if(!row)break;
      if(row.length===1&&row[0]===null)continue;
      chunk.push(row);
      if(chunk.length>=CHUNK_SIZE){onChunk(chunk,'Sheet1',first);first=false;chunk=[];await tick();}
    }
    if(chunk.length)onChunk(chunk,'Sheet1',first);
    return;
  }

  /* ZIP path */
  const entries = parseCentralDir(u8);

  const wbEntry = entries['xl/workbook.xml'];
  if (!wbEntry) throw new Error('xl/workbook.xml not found');
  const wbXml = await decompressToString(wbEntry, u8);

  const sheetMap = {};
  for (const m of wbXml.matchAll(/<sheet\s[^>]*name="([^"]*)"[^>]*r:id="([^"]*)"[^>]*\/?>/g))
    sheetMap[m[1]] = m[2];
  const sheetNames = Object.keys(sheetMap);
  if (!sheetNames.length) throw new Error('No sheets found in workbook');

  let sn = sheetNames[0];
  outer: for (const n of sheetNames)
    for (const c of sheetCands)
      if (n.toLowerCase()===c.toLowerCase()){sn=n;break outer;}
  if (sn===sheetNames[0]) {
    outer2: for (const n of sheetNames)
      for (const c of sheetCands)
        if (n.toLowerCase().includes(c.toLowerCase())||c.toLowerCase().includes(n.toLowerCase())){sn=n;break outer2;}
  }

  const relsEntry = entries['xl/_rels/workbook.xml.rels'];
  if (!relsEntry) throw new Error('workbook.xml.rels not found');
  const relsXml = await decompressToString(relsEntry, u8);
  const targetRId = sheetMap[sn];
  const relMatch = relsXml.match(new RegExp(`Id="${targetRId}"[^>]*Target="([^"]+)"`));
  if (!relMatch) throw new Error('Cannot find sheet file for: ' + sn);
  let sheetPath = relMatch[1].replace(/^\//,'');
  if (!sheetPath.startsWith('xl/')) sheetPath = 'xl/' + sheetPath;

  let sharedStrings = [];
  const ssEntry = entries['xl/sharedStrings.xml'];
  if (ssEntry && ssEntry.compSize > 0) {
    const ssXml = await decompressToString(ssEntry, u8);
    sharedStrings = parseSharedStrings(ssXml);
  }

  const sheetEntry = entries[sheetPath];
  if (!sheetEntry) throw new Error('Sheet file not found: ' + sheetPath);

  /* Stream-parse, calling onChunk for each batch */
  let first = true;
  await streamParseSheet_main(sheetEntry, u8, sharedStrings, sn, CHUNK_SIZE, (chunk, sheetName) => {
    onChunk(chunk, sheetName, first);
    first = false;
  });
}

/* Variant of streamParseSheet that calls a callback instead of postMessage */
async function streamParseSheet_main(entry, u8, sharedStrings, sheetName, CHUNK_SIZE, onChunk) {
  const compData = getEntryData(u8, entry);

  let rawReader;
  if (entry.compression === 0) {
    rawReader = new ReadableStream({start(ctrl){ctrl.enqueue(compData);ctrl.close();}}).getReader();
  } else {
    const ds = new DecompressionStream('deflate-raw');
    const writer = ds.writable.getWriter();
    writer.write(compData);
    writer.close();
    rawReader = ds.readable.getReader();
  }

  const dec = new TextDecoder('utf-8');
  let xmlBuf = '';
  let chunk = [];
  let maxCol = 0;
  let inSheetData=false,inRow=false,inCell=false,inV=false,inIs=false,inT=false;
  let cellType='',cellAddr=null,cellVal=null,rowCells=null;

  function emitRow(){
    if(!rowCells)return;
    const cols=Object.keys(rowCells);
    if(cols.length){const mx=Math.max(...cols.map(Number));if(mx>maxCol)maxCol=mx;}
    const row=new Array(maxCol+1).fill(null);
    for(const ci of cols)row[+ci]=rowCells[ci];
    chunk.push(row);rowCells=null;
  }
  function flushChunk(){
    if(!chunk.length)return;
    const cl=maxCol+1;
    for(const r of chunk){while(r.length<cl)r.push(null);}
    onChunk([...chunk],sheetName);
    chunk=[];
  }
  function processBuffer(){
    while(true){
      const lt=xmlBuf.indexOf('<');
      if(lt<0){
        if((inV||inT)&&xmlBuf.length>0){cellVal=(cellVal==null?'':cellVal)+ent(xmlBuf);xmlBuf='';}
        else xmlBuf='';
        break;
      }
      if(lt>0&&(inV||inT)){
        const text=ent(xmlBuf.slice(0,lt));
        if(inV)cellVal=(cellVal==null?'':cellVal)+text;
        else if(inT)cellVal=(cellVal==null?'':cellVal)+text;
      }
      if(lt>0)xmlBuf=xmlBuf.slice(lt);
      const gt=xmlBuf.indexOf('>');
      if(gt<0)break;
      const raw=xmlBuf.slice(1,gt);
      xmlBuf=xmlBuf.slice(gt+1);
      const isClose=raw[0]==='/';
      const isSelf=raw[raw.length-1]==='/';
      const body=isClose?raw.slice(1):raw;
      const tagName=body.replace(/[\s\/][\s\S]*/,'');
      if(!isClose&&!isSelf){
        if(!inSheetData){if(tagName==='sheetData')inSheetData=true;}
        else{
          if(tagName==='row'){rowCells={};inRow=true;}
          else if(tagName==='c'&&inRow){
            const am=/\br="([A-Z]+\d+)"/.exec(raw);const tm=/\bt="([^"]*)"/.exec(raw);
            cellAddr=am?decodeAddr(am[1]):null;cellType=tm?tm[1]:'';cellVal=null;
            inCell=true;inV=false;inIs=false;inT=false;
          }
          else if(tagName==='v'&&inCell){inV=true;cellVal=null;}
          else if(tagName==='is'&&inCell){inIs=true;}
          else if(tagName==='t'&&inIs){inT=true;cellVal=null;}
        }
      } else {
        if(tagName==='sheetData'||tagName==='worksheet'){emitRow();flushChunk();return;}
        else if(tagName==='row'){
          emitRow();
          if(chunk.length>=CHUNK_SIZE){flushChunk();}
          inRow=false;
        }
        else if(tagName==='c'){
          if(inCell&&cellAddr&&rowCells!==null)rowCells[cellAddr.c]=cellVal;
          inCell=false;cellVal=null;cellType='';cellAddr=null;inV=false;inIs=false;inT=false;
        }
        else if(tagName==='v'){
          if(inV&&cellVal!=null){
            const sv=String(cellVal);
            if(cellType==='s'){const si=parseInt(sv,10);cellVal=(si>=0&&si<sharedStrings.length)?sharedStrings[si]:sv;}
            else{const n=parseFloat(sv);cellVal=isNaN(n)?sv:n;}
          }
          inV=false;
        }
        else if(tagName==='t'){inT=false;}
        else if(tagName==='is'){inIs=false;}
      }
    }
  }

  let rowsSinceYield = 0;
  while(true){
    const {done,value}=await rawReader.read();
    if(done)break;
    xmlBuf+=dec.decode(value,{stream:true});
    processBuffer();
    rowsSinceYield += chunk.length;
    if(rowsSinceYield >= CHUNK_SIZE){ await tick(); rowsSinceYield=0; }
  }
  if(xmlBuf)processBuffer();
  flushChunk();
}

/* ---- Helpers ---- */
const L=[];
function log(s){L.push(s);if(L.length>300)L.shift()}
function flushLog(){document.getElementById('log').value=L.join('\n')}
function setStatus(t,state){const s=document.getElementById('status'),d=document.getElementById('statusDot');s.textContent=t||'';d.classList.remove('ok','err');if(state==='ok')d.classList.add('ok');else if(state==='err')d.classList.add('err')}
function showWarning(m){const b=document.getElementById('warningBanner');b.style.display=m?'block':'none';b.textContent=m||''}
function prog(p){const w=document.getElementById('progWrap'),b=document.getElementById('progBar');w.style.display=p>=0?'block':'none';b.style.width=Math.min(100,Math.max(0,p))+'%'}

/* yield to browser */
const tick=()=>new Promise(r=>setTimeout(r,0));

function fc(hdr,names){
  if(!hdr)return -1;
  for(const n of names){const ln=n.toLowerCase().trim();for(let i=0;i<hdr.length;i++){if(String(hdr[i]||'').toLowerCase().trim()===ln)return i}}
  return -1;
}
/* Fuzzy finder for Top-of-search IS — handles any capitalisation / punctuation variant */
function fcTos(hdr){
  if(!hdr)return -1;
  for(let i=0;i<hdr.length;i++){
    const v=String(hdr[i]||'').toLowerCase().replace(/[^a-z0-9]/g,' ').replace(/\s+/g,' ').trim();
    if(v.includes('top') && (v.includes('search') || v.includes('srch')) &&
       (v.includes('impression') || v.includes('impr') || v.includes('is') || v.includes('share')))
      return i;
  }
  return -1;
}
function gv(r,i){return(i>=0&&r&&i<r.length)?r[i]:''}
function num(v){if(v==null||v==='')return 0;if(typeof v==='number')return isFinite(v)?v:0;const n=parseFloat(String(v).replace(/[^0-9.\-eE]/g,''));return isNaN(n)?0:n}
function acosDec(v){if(v==null||v==='')return 0;if(typeof v==='number')return isFinite(v)?v:0;const s=String(v).trim();if(!s)return 0;if(s.includes('%')){const n=parseFloat(s.replace(/[^0-9.\-eE]/g,''));return isNaN(n)?0:n/100}const n=parseFloat(s.replace(/[^0-9.\-eE]/g,''));return isNaN(n)?0:Math.abs(n)>1?n/100:n}

function isPlacementTop(pl){
  const s=String(pl||'').toLowerCase().trim();
  return s==='placement top'||s==='top of search (on-amazon)'||s==='top'||s.includes('top of search');
}

/* Load a sheet via the worker. The ArrayBuffer is TRANSFERRED (not copied)
   to the worker, so the main thread immediately frees that memory. */
async function loadSheet(file, sheetCands, label) {
  try {
    let aoa = null;
    let resolvedSheetName = '';
    await parseInWorker(file, sheetCands, (chunk, sheetName, first) => {
      if (first) {
        resolvedSheetName = sheetName;
        aoa = chunk;
      } else {
        for (let i = 0; i < chunk.length; i++) aoa.push(chunk[i]);
      }
    });
    const rows = aoa && aoa.length > 1 ? aoa.length - 1 : 0;
    log(label + ': "' + resolvedSheetName + '" → ' + rows + ' rows');
    await tick();
    return aoa;
  } catch(e) {
    const msg = e.message || String(e);
    if (msg.includes('allocation') || msg.includes('memory') || msg.includes('ArrayBuffer')) {
      throw new Error('Out of memory parsing "' + file.name + '". The file is too large for your browser. Try:\n• Closing other tabs\n• Using Chrome (higher memory limits)\n• Splitting the file into smaller parts');
    }
    throw new Error('Failed to read "' + file.name + '": ' + msg);
  }
}

/* ---- File assignment UI ---- */
document.getElementById('allFiles').addEventListener('change',e=>{
  const files=Array.from(e.target.files);if(!files.length)return;
  const roles=['Bulk 30d','Bulk 7d','30d campaigns','7d campaigns','Day Before Yesterday','Yesterday'];
  const c=document.getElementById('fileAssignments');c.innerHTML='';showWarning('');

  function getUsed(){
    const u=new Set();
    c.querySelectorAll('select').forEach(s=>{
      if(s.multiple)Array.from(s.selectedOptions).forEach(o=>{if(o.value!=='')u.add(o.value)});
      else if(s.value!=='')u.add(s.value);
    });return u;
  }
  function refresh(){
    const u=getUsed();
    c.querySelectorAll('select').forEach(s=>{
      const my=new Set();
      if(s.multiple)Array.from(s.selectedOptions).forEach(o=>{if(o.value!=='')my.add(o.value)});
      else if(s.value!=='')my.add(s.value);
      Array.from(s.options).forEach(o=>{if(o.value!=='')o.disabled=u.has(o.value)&&!my.has(o.value)});
    });
  }

  roles.forEach(role=>{
    const sel=document.createElement('select');sel.dataset.role=role;
    const multi=['30d campaigns','7d campaigns','Day Before Yesterday','Yesterday'].includes(role);
    if(multi)sel.multiple=true;
    let h=multi?'':'<option value="">-- Select --</option>';
    files.forEach((f,i)=>{h+='<option value="'+i+'">'+f.name+'</option>'});
    sel.innerHTML=h;
    const lbl=document.createElement('label');lbl.textContent=role;lbl.appendChild(sel);
    if(multi){
      const sp=document.createElement('span');sp.className='small';sp.style.marginLeft='6px';sp.textContent='(0)';
      lbl.appendChild(sp);
      sel.addEventListener('change',()=>{sp.textContent='('+sel.selectedOptions.length+')';refresh()});
    }else{sel.addEventListener('change',refresh)}
    c.appendChild(lbl);
  });
});

/* ---- Main processing ---- */
document.getElementById('proceed').addEventListener('click',async function(){
  this.disabled=true;setStatus('Working...');showWarning('');prog(0);L.length=0;log('Start');flushLog();
  try{
    const allFiles=document.getElementById('allFiles').files;
    const selects=document.querySelectorAll('#fileAssignments select');
    if(!allFiles||!allFiles.length)throw new Error('Upload files first');
    if(!selects.length)throw new Error('Upload files first');

    /* collect role→files */
    const rf={};
    selects.forEach(sel=>{
      const idxs=sel.multiple?Array.from(sel.selectedOptions).map(o=>o.value).filter(v=>v!==''):(sel.value!==''?[sel.value]:[]);
      if(idxs.length)rf[sel.dataset.role.replace(/\s+/g,'')]=idxs.map(i=>allFiles[parseInt(i)]);
    });
    if(!Object.keys(rf).length)throw new Error('Assign at least one file');

    const bulkS=['Sponsored Products Campaigns','Sponsored Products - Campaigns','Sponsored Products'];
    const campS=['Campaigns','Sponsored Products Campaigns','Sheet1'];
    let step=0,totalSteps=Object.values(rf).reduce((a,b)=>a+b.length,0)+3;
    function sp(){step++;prog(step/totalSteps*100);flushLog()}

    /* ===== 1. Bulk30d → USA entries ===== */
    let usa=[];
    if(rf.Bulk30d){
      log('--- Bulk 30d ---');
      const aoa=await loadSheet(rf.Bulk30d[0],bulkS,'Bulk30d');sp();
      if(aoa&&aoa.length>1){
        const h=aoa[0];
        const C={cn:fc(h,['Campaign Name (Informational only)','Campaign Name','Campaigns']),
                 st:fc(h,['Campaign State (Informational only)','Campaign State']),
                 cl:fc(h,['Clicks']),sp:fc(h,['Spend','Spend (USD)','Total Spend']),
                 or:fc(h,['Orders','Total Orders']),ac:fc(h,['ACOS','ACoS']),
                 pl:fc(h,['Placement']),pc:fc(h,['Percentage','%'])};
        for(let i=1;i<aoa.length;i++){
          const r=aoa[i];if(!r)continue;
          const pl=gv(r,C.pl);if(!pl||String(pl).trim()==='')continue;
          const st=gv(r,C.st);if(st&&String(st).toLowerCase().includes('paused'))continue;
          const pcRaw=gv(r,C.pc);if(pcRaw===null||pcRaw===undefined||String(pcRaw).trim()==='')continue;
          usa.push([String(gv(r,C.cn)||''),num(gv(r,C.cl)),num(gv(r,C.sp)),
                    num(gv(r,C.or)),acosDec(gv(r,C.ac)),String(pl).trim(),
                    num(pcRaw),'']);
          aoa[i]=null;
        }
        aoa.length=0;
      }
      log('USA entries: '+usa.length);
    }
    await tick();

    /* ===== 2. Bulk7d → b7 entries + placement lookup map ===== */
    let b7=[];
    let b7Map=new Map();
    if(rf.Bulk7d){
      log('--- Bulk 7d ---');
      for(const file of rf.Bulk7d){
        const aoa=await loadSheet(file,bulkS,'Bulk7d');sp();
        if(!aoa||aoa.length<2)continue;
        const h=aoa[0];
        const C={cn:fc(h,['Campaign Name (Informational only)','Campaign Name','Campaigns']),
                 st:fc(h,['Campaign State (Informational only)','Campaign State']),
                 cl:fc(h,['Clicks']),sp:fc(h,['Spend','Spend (USD)','Total Spend']),
                 or:fc(h,['Orders']),ac:fc(h,['ACOS','ACoS']),pl:fc(h,['Placement']),
                 pc:fc(h,['Percentage','%'])};
        for(let i=1;i<aoa.length;i++){
          const r=aoa[i];if(!r)continue;
          const pl=gv(r,C.pl);if(!pl||String(pl).trim()==='')continue;
          const st=gv(r,C.st);if(st&&String(st).toLowerCase().includes('paused'))continue;
          const pcRaw=gv(r,C.pc);if(pcRaw===null||pcRaw===undefined||String(pcRaw).trim()==='')continue;
          const cn=String(gv(r,C.cn)||''),pls=String(pl).trim();
          const clicks=num(gv(r,C.cl)),spend=num(gv(r,C.sp)),orders=num(gv(r,C.or)),acos=acosDec(gv(r,C.ac));
          b7.push([cn,pls,clicks,spend,orders,acos]);
          b7Map.set(cn.toLowerCase()+'|'+pls.toLowerCase(),{acos,spend,orders});
          aoa[i]=null;
        }
        aoa.length=0;
      }
      log('Bulk7d entries: '+b7.length);
    }
    await tick();

    /* ===== 3. DayBefore → db entries ===== */
    let db=[];
    if(rf.DayBeforeYesterday){
      log('--- Day Before Yesterday ---');
      for(const file of rf.DayBeforeYesterday){
        const aoa=await loadSheet(file,campS,'DayBefore');sp();
        if(!aoa||aoa.length<2)continue;
        const h=aoa[0];
        const C={cn:fc(h,['Campaigns','Campaign Name','Campaign']),
                 po:fc(h,['Portfolio','Portfolio name','Portfolio Name']),
                 bu:fc(h,['Budget','Daily Budget','Budget (USD)','Campaign budget amount']),
                 sp:fc(h,['Spend','Spend (USD)','Total Spend','Total Cost'])};
        for(let i=1;i<aoa.length;i++){
          const r=aoa[i];if(!r)continue;
          const rawBu=String(gv(r,C.bu)||'').replace(/US\$|\$|USD/g,'').trim();
          db.push([String(gv(r,C.cn)||''),String(gv(r,C.po)||''),rawBu,num(gv(r,C.sp))]);
          aoa[i]=null;
        }
        aoa.length=0;
      }
      log('DayBefore entries: '+db.length);
    }
    await tick();

    /* ===== 4. Yesterday → yd entries + TOS ===== */
    let yd=[];
    let tosYd=[];
    if(rf.Yesterday){
      log('--- Yesterday ---');
      for(const file of rf.Yesterday){
        const aoa=await loadSheet(file,campS,'Yesterday');sp();
        if(!aoa||aoa.length<2)continue;
        const h=aoa[0];
        const C={cn:fc(h,['Campaigns','Campaign Name','Campaign']),
                 sp:fc(h,['Spend','Spend (USD)','Total Spend','Total Cost']),
                 tos:fcTos(h)};
        for(let i=1;i<aoa.length;i++){
          const r=aoa[i];if(!r)continue;
          yd.push([String(gv(r,C.cn)||''),num(gv(r,C.sp))]);
          if(C.tos>=0)tosYd.push([String(gv(r,C.cn)||''),gv(r,C.tos)||0]);
          aoa[i]=null;
        }
        aoa.length=0;
      }
      log('Yesterday entries: '+yd.length);
    }
    await tick();

    /* ===== 5. 30d campaigns → TOS ===== */
    let tos30=[];
    if(rf['30dcampaigns']){
      log('--- 30d campaigns ---');
      for(const file of rf['30dcampaigns']){
        const aoa=await loadSheet(file,campS,'30d camps');sp();
        if(!aoa||aoa.length<2)continue;
        const h=aoa[0];
        const C={cn:fc(h,['Campaigns','Campaign Name','Campaign']),
                 tos:fcTos(h)};
        for(let i=1;i<aoa.length;i++){
          const r=aoa[i];if(!r)continue;
          tos30.push([String(gv(r,C.cn)||''),gv(r,C.tos)||0]);
          aoa[i]=null;
        }
        aoa.length=0;
      }
      log('TOS 30d: '+tos30.length);
    }
    await tick();

    /* ===== 6. 7d campaigns → TOS ===== */
    let tos7=[];
    if(rf['7dcampaigns']){
      log('--- 7d campaigns ---');
      for(const file of rf['7dcampaigns']){
        const aoa=await loadSheet(file,campS,'7d camps');sp();
        if(!aoa||aoa.length<2)continue;
        const h=aoa[0];
        const C={cn:fc(h,['Campaigns','Campaign Name','Campaign']),
                 tos:fcTos(h)};
        for(let i=1;i<aoa.length;i++){
          const r=aoa[i];if(!r)continue;
          tos7.push([String(gv(r,C.cn)||''),gv(r,C.tos)||0]);
          aoa[i]=null;
        }
        aoa.length=0;
      }
      log('TOS 7d: '+tos7.length);
    }
    await tick();

    /* ===== 7. Apply placement changes ===== */
    log('--- Placement changes ---');
    if(usa.length&&b7Map.size){
      let m=0;
      for(const e of usa){
        const k=e[0].toLowerCase()+'|'+e[5].toLowerCase();
        const u=b7Map.get(k);
        if(!u)continue;
        m++;
        const base=e[6];
        const placement=e[5];
        let nv=base;

        if(u.acos===0 && !isPlacementTop(placement)){
          e[7]='';
          continue;
        }

        if(u.spend>10&&u.orders===0){nv=base-5;}
        else if(u.spend>0&&u.orders===0){nv=base+5;}
        else if(u.spend===0&&u.orders===0){nv=base+5;}
        else{
          if(u.acos>=0.7){nv=base-5;}
          else if(u.acos>=0.5){nv=base-5;}
          else if(u.acos>=0.2&&u.acos<0.3){nv=base+5;}
          else if(u.acos>=0.1&&u.acos<0.2){nv=base+10;}
          else if(u.acos>0&&u.acos<0.1){nv=base+15;}
        }

        if(nv<0)nv=0;
        if(nv>900)nv=900;
        const rounded=Math.round(nv*100)/100;
        e[7]=(rounded!==base)?rounded:'';
      }
      log('Placement matches: '+m+'/'+usa.length);
    }
    b7Map.clear();b7Map=null;
    await tick();sp();

    /* ===== 8. Build output — load XLSX only now in main thread for writing ===== */
    log('--- Building output ---');

    // Dynamically load XLSX into main thread only when needed for writing
    // (it was never loaded here before — worker had its own copy)
    if (typeof XLSX === 'undefined') {
      await new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }

    const out=XLSX.utils.book_new();
    let added=0;

    /* USA sheet */
    if(usa.length){
      const hdr=['Campaign Name (Informational only)','Portfolio','Budget','Clicks','Spend','Orders','CVR','ACOS',
        'total Clicks','total Spend','total Orders','total CVR','total ACoS',
        'Spent DB Yesterday','Spent Yesterday','Budget Check',
        'Last 30 days','Last 7 days','Yesterday','Placement','Percentage','Changes in placement'];
      const aoa=[hdr];
      for(let i=0;i<usa.length;i++){
        const e=usa[i];
        aoa.push([e[0],'','',e[1],e[2],e[3],'',(e[4]!==''&&e[4]!=null)?+(e[4]*100).toFixed(2)+'%':'','','','','','','','','','','','',e[5],e[6],e[7]]);
        usa[i]=null;
      }
      usa.length=0;
      XLSX.utils.book_append_sheet(out,XLSX.utils.aoa_to_sheet(aoa),'USA');added++;
      log('USA sheet: '+(aoa.length-1)+' rows');
      aoa.length=0;
      await tick();
    }

    /* Data update sheet */
    const duLen=Math.max(b7.length,db.length,yd.length);
    if(duLen){
      const hdr=['Campaign Name_bulk7','Placement','Clicks','Spend_bulk7','Orders','ACOS',
        'Campaign Name_dayBefore','Portfolio_dayBefore','Budget_dayBefore','Spend_dayBefore',
        'Campaign Name_yesterday','Spend_yesterday'];
      const aoa=[hdr];
      for(let i=0;i<duLen;i++){
        const a=b7[i],d=db[i],y=yd[i];
        aoa.push([
          a?a[0]:'',a?a[1]:'',a?a[2]:'',a?a[3]:'',a?a[4]:'',a?a[5]:'',
          d?d[0]:'',d?d[1]:'',d?d[2]:'',d?d[3]:'',
          y?y[0]:'',y?y[1]:''
        ]);
      }
      b7.length=0;db.length=0;yd.length=0;
      XLSX.utils.book_append_sheet(out,XLSX.utils.aoa_to_sheet(aoa),'data update');added++;
      log('Data update: '+(aoa.length-1)+' rows');
      aoa.length=0;
      await tick();
    }

    /* TOS sheet */
    const tosLen=Math.max(tos30.length,tos7.length,tosYd.length);
    if(tosLen){
      const hdr=['Campaigns_30d','30d TOS','','Campaigns_7d','7d TOS','','Campaigns_yesterday','yesterday TOS'];
      const aoa=[hdr];
      for(let i=0;i<tosLen;i++){
        const a=tos30[i],b=tos7[i],c=tosYd[i];
        aoa.push([a?a[0]:'',a?a[1]:0,'',b?b[0]:'',b?b[1]:0,'',c?c[0]:'',c?c[1]:0]);
      }
      tos30.length=0;tos7.length=0;tosYd.length=0;
      XLSX.utils.book_append_sheet(out,XLSX.utils.aoa_to_sheet(aoa),'TOS');added++;
      log('TOS: '+(aoa.length-1)+' rows');
      aoa.length=0;
      await tick();
    }

    if(!added){
      XLSX.utils.book_append_sheet(out,XLSX.utils.aoa_to_sheet([['No data generated']]),'Info');
      showWarning('No data — check file assignments');
    }
    sp();

    log('Writing file...');flushLog();
    await tick();
    const outBuf=XLSX.write(out,{bookType:'xlsx',type:'array'});
    const blob=new Blob([outBuf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='placement.xlsx';document.body.appendChild(a);a.click();
    setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},1000);
    log('✅ Exported placement.xlsx');
    setStatus('Done — downloaded','ok');prog(100);

  }catch(err){
    console.error(err);log('❌ '+err.message);setStatus('Error: '+err.message,'err');showWarning(err.message);
  }finally{
    flushLog();prog(-1);this.disabled=false;
  }
});
</script>
</body>
</html>
